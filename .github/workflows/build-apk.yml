name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          CI: 1

      - name: Fix enableBundleCompression in build.gradle
        run: |
          sed -i '/enableBundleCompression/d' android/app/build.gradle
          echo "Patched build.gradle - removed enableBundleCompression"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.jvmargs=-Xmx3g"

      - name: Find APK
        run: find android/app/build/outputs/apk -name "*.apk" | head -5

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blaktrans-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
